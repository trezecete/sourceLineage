<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Data Lineage Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        theme: {
                            primary: '#660099',
                            light: '#F2EBF6',
                            dark: '#1A1A1A',
                            accent: '#C0FF00',
                        }
                    },
                    fontFamily: {
                        exo: ['Exo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Exo', sans-serif; background-color: #f8f9fa; color: #1A1A1A; }
        .hero-gradient { background: linear-gradient(135deg, #660099 0%, #4d007a 100%); }
        .main-card { background: white; border-radius: 12px; border: 1px solid #e1e4e8; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .mermaid svg { 
            width: 100% !important; 
            height: auto !important;
            min-height: 500px;
        }
        .node text { fill: #1A1A1A !important; font-weight: 500; }
        .edgeLabel text { fill: #660099 !important; font-weight: 600; font-size: 10px; }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [project, setProject] = useState(null);
            const [location, setLocation] = useState("us");
            const [fullTablePath, setFullTablePath] = useState("");
            const [lineage, setLineage] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const mermaidRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                mermaid.initialize({ 
                    startOnLoad: false, 
                    theme: 'base',
                    securityLevel: 'loose',
                    themeVariables: {
                        primaryColor: '#F2EBF6',
                        primaryTextColor: '#1A1A1A',
                        primaryBorderColor: '#660099',
                        lineColor: '#660099',
                        secondaryColor: '#C0FF00',
                        tertiaryColor: '#ffffff',
                        fontSize: '14px',
                        fontFamily: 'Exo'
                    }
                });
            }, []);

            const sanitizeId = (id) => "n_" + id.replace(/[^a-zA-Z0-9]/g, "_");

            const renderGraph = (nodes, edges) => {
                if (!nodes || nodes.length === 0) {
                    setLineage({ nodes: [], edges: [], definition: "" });
                    return;
                }
                
                try {
                    let graphDef = "graph LR\n";
                    nodes.forEach(node => {
                        const sid = sanitizeId(node);
                        const isStart = (fullTablePath && node.toLowerCase().includes(fullTablePath.toLowerCase().trim()));
                        const style = isStart ? "fill:#C0FF00,stroke:#660099,stroke-width:2px" : "fill:#F2EBF6,stroke:#660099";
                        graphDef += `    ${sid}["${node}"]\n`;
                        graphDef += `    style ${sid} ${style}\n`;
                    });
                    
                    edges.forEach(edge => {
                        const srcSid = sanitizeId(edge.source);
                        const trgSid = sanitizeId(edge.target);
                        const label = edge.columns ? edge.columns.replace(/["\n\r]/g, " ") : "";
                        if (label) {
                            graphDef += `    ${srcSid} -- "${label}" --> ${trgSid}\n`;
                        } else {
                            graphDef += `    ${srcSid} --> ${trgSid}\n`;
                        }
                    });

                    setLineage({ nodes, edges, definition: graphDef });
                    
                    setTimeout(async () => {
                        if (mermaidRef.current) {
                            try {
                                mermaidRef.current.removeAttribute('data-processed');
                                mermaidRef.current.innerHTML = graphDef;
                                await mermaid.run({ nodes: [mermaidRef.current] });
                            } catch (mErr) {
                                console.error("Mermaid Render Error:", mErr);
                                setError("Erro de sintaxe no grafo.");
                            }
                        }
                    }, 100);
                } catch (err) {
                    setError("Erro na geração do grafo.");
                }
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                setError(null);
                const formData = new FormData();
                formData.append("file", file);
                try {
                    const res = await fetch("/api/upload-sa", { method: "POST", body: formData });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Erro no upload");
                    setProject(data.project_id);
                } catch (err) { setError(err.message); } finally { setLoading(false); }
            };

            const handleScan = async () => {
                setLoading(true);
                setError(null);
                try {
                    const res = await fetch("/api/scan", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ location, start_table: fullTablePath })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Erro no scan");
                    renderGraph(data.nodes, data.edges);
                } catch (err) { setError(err.message); } finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen flex flex-col bg-[#f8f9fa]">
                    <header className="bg-white border-b border-gray-200 py-4 px-8 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center space-x-3">
                            <div className="w-10 h-10 hero-gradient rounded-lg flex items-center justify-center text-white font-bold text-xl uppercase">BQ</div>
                            <div>
                                <h1 className="text-xl font-bold text-theme-primary tracking-tight uppercase">Data Lineage</h1>
                                <p className="text-[10px] uppercase tracking-widest text-gray-400 font-bold italic">BigQuery Explorer Tool</p>
                            </div>
                        </div>
                        {project && (
                            <div className="flex items-center space-x-4">
                                <span className="text-xs text-gray-500 font-bold uppercase tracking-wide">Projeto: <span className="text-theme-primary font-black">{project}</span></span>
                                <button onClick={() => setProject(null)} className="text-xs text-theme-primary hover:underline font-black outline-none">SAIR</button>
                            </div>
                        )}
                    </header>

                    <main className="flex-grow container mx-auto px-4 py-8">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-4 xl:col-span-3 space-y-6">
                                <div className="main-card p-6 bg-white">
                                    <h2 className="text-md font-black text-theme-primary mb-6 flex items-center uppercase tracking-wider">
                                        <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
                                        Parâmetros
                                    </h2>

                                    {!project ? (
                                        <div 
                                            onClick={() => fileInputRef.current.click()}
                                            className="group cursor-pointer border-2 border-dashed border-gray-200 hover:border-theme-primary rounded-xl p-8 text-center bg-gray-50 transition-all"
                                        >
                                            <svg className="w-10 h-10 mx-auto mb-3 text-gray-300 group-hover:text-theme-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                                            <p className="text-sm font-bold text-gray-500 group-hover:text-theme-primary uppercase tracking-widest">Carregar JSON</p>
                                            <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={handleFileUpload} />
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest">Localização</label>
                                                <select 
                                                    value={location} 
                                                    onChange={e => setLocation(e.target.value)}
                                                    className="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm focus:bg-white focus:ring-2 focus:ring-theme-primary/20 transition-all outline-none font-bold"
                                                >
                                                    <option value="us">US (Multi-region)</option>
                                                    <option value="eu">EU (Multi-region)</option>
                                                    <option value="southamerica-east1">São Paulo (sa-east1)</option>
                                                </select>
                                            </div>

                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest">Busca (Tabela)</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="projeto.dataset.tabela"
                                                    value={fullTablePath}
                                                    onChange={e => setFullTablePath(e.target.value)}
                                                    className="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm focus:bg-white focus:ring-2 focus:ring-theme-primary/20 outline-none transition-all font-mono"
                                                />
                                            </div>

                                            <button 
                                                onClick={handleScan}
                                                disabled={loading}
                                                className="w-full py-4 hero-gradient text-white rounded-xl font-black text-xs shadow-xl shadow-purple-900/20 active:scale-95 transition-all disabled:opacity-50 uppercase tracking-[0.2em]"
                                            >
                                                {loading ? "Processando..." : "Gerar Linhagem"}
                                            </button>
                                        </div>
                                    )}

                                    {error && (
                                        <div className="mt-4 p-4 bg-red-50 border-l-4 border-red-500 rounded text-red-600 text-xs font-bold animate__animated animate__headShake">
                                            {error}
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="lg:col-span-8 xl:col-span-9">
                                <div className="main-card min-h-[750px] flex flex-col relative overflow-hidden bg-white">
                                    <div className="bg-gray-50 border-b border-gray-100 px-6 py-4 flex justify-between items-center">
                                        <h3 className="font-black text-theme-primary text-xs uppercase tracking-[0.2em]">Visualização do Grafo</h3>
                                        {lineage && lineage.nodes.length > 0 && (
                                            <span className="px-3 py-1 bg-theme-primary text-white rounded-md text-[9px] font-black uppercase tracking-widest italic">
                                                {lineage.nodes.length} Entidades
                                            </span>
                                        )}
                                    </div>

                                    <div className="flex-grow flex items-center justify-center p-12 overflow-auto bg-white">
                                        {!lineage ? (
                                            <div className="text-center space-y-4 max-w-sm animate__animated animate__fadeIn">
                                                <div className="w-16 h-16 bg-gray-50 rounded-2xl flex items-center justify-center mx-auto text-gray-200">
                                                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2" /></svg>
                                                </div>
                                                <p className="text-xs text-gray-400 font-bold uppercase tracking-widest">Insira os termos para mapear o fluxo</p>
                                            </div>
                                        ) : lineage.nodes.length === 0 ? (
                                            <div className="text-center text-gray-400 animate__animated animate__fadeIn">
                                                <p className="font-bold uppercase tracking-widest text-xs">Nenhum vínculo identificado.</p>
                                            </div>
                                        ) : (
                                            <div className="w-full flex justify-center">
                                                <div ref={mermaidRef} className="mermaid w-full text-center"></div>
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="p-4 border-t border-gray-100 bg-gray-50/50 text-[9px] text-gray-400 font-black flex justify-between uppercase tracking-[0.2em]">
                                        <span>BIGQUERY LINEAGE | ANALYSIS TOOL</span>
                                        <div className="flex space-x-8">
                                            <span className="flex items-center"><span className="w-3 h-3 bg-theme-accent rounded-sm shadow-sm mr-2 border border-gray-200"></span> ALVO</span>
                                            <span className="flex items-center"><span className="w-3 h-3 bg-theme-light border border-theme-primary rounded-sm shadow-sm mr-2"></span> ORIGEM</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
